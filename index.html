<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Paso Homebuyer Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    <style>
        :root {
            --bg-color: #f4f7f9;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #2563eb;
            --border: #e2e8f0;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
        }

        /* Modern Navigation */
        nav {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border);
            z-index: 100;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav h1 { font-size: 1.25rem; font-weight: 700; color: var(--primary); }
        
        .nav-links a {
            margin-left: 1.5rem;
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            transition: color 0.2s;
        }
        
        .nav-links a:hover { color: var(--primary); }

        /* Dashboard Layout */
        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .header-section { margin-bottom: 3rem; text-align: center; }
        .header-section h2 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .header-section p { color: var(--text-muted); font-size: 1.1rem; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 2rem;
        }

        /* Glassmorphic Chart Cards */
        .chart-card {
            background: var(--surface);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid var(--border);
            transition: transform 0.2s;
        }

        .chart-card:hover { transform: translateY(-2px); }
        .chart-card h3 { font-size: 1.1rem; margin-bottom: 1rem; color: var(--text-main); }
        
        .chart-container { width: 100%; height: 400px; }

    </style>
</head>
<body>

    <nav>
        <h1>EP Housing Analytics</h1>
        <div class="nav-links">
            <a href="index.html">Overview</a>
            <a href="analysis.html">Full Analysis</a>
            <a href="map.html">Interactive Map</a>
        </div>
    </nav>

    <div class="container">
        <div class="header-section">
            <h2>Market Dynamics & Affordability</h2>
            <p>Data-driven insights into first-time homebuyer patterns in El Paso County</p>
        </div>

        <div class="dashboard-grid">
            <div class="chart-card">
                <h3>Origin vs. Destination Migration Patterns</h3>
                <div id="migrationChart" class="chart-container"></div>
            </div>

            <div class="chart-card">
                <h3>Affordability Squeeze ($250k - $350k Tier)</h3>
                <div id="affordabilityChart" class="chart-container"></div>
            </div>
        </div>
    </div>

    <script>
        // Shared modern layout settings for all Plotly charts
        const layoutConfig = {
            font: { family: 'Inter, sans-serif' },
            paper_bgcolor: 'rgba(0,0,0,0)', // Transparent background
            plot_bgcolor: 'rgba(0,0,0,0)',
            margin: { t: 20, r: 20, b: 40, l: 40 },
            // FIXED: Notice 'white' is not used directly, and grid colors use quoted strings
            xaxis: { gridcolor: '#e2e8f0', zerolinecolor: '#e2e8f0' },
            yaxis: { gridcolor: '#e2e8f0', zerolinecolor: '#e2e8f0' } 
        };

        const config = { responsive: true, displayModeBar: false };

        // Chart 1: Migration Flow (Bar Chart)
        const migrationData = [{
            x: ['Central Core', 'Northeast (79934)', 'Far East (79938)', 'Westside'],
            y: [-15, 22, 45, 8],
            type: 'bar',
            marker: {
                color: ['#ef4444', '#3b82f6', '#2563eb', '#93c5fd'],
                borderRadius: 4
            }
        }];
        
        Plotly.newPlot('migrationChart', migrationData, layoutConfig, config);

        // Chart 2: Affordability Line Chart
        const affordabilityData = [
            {
                x: ['2020', '2021', '2022', '2023', '2024', '2025'],
                y: [195000, 215000, 245000, 260000, 275000, 285000],
                name: 'Median Home Price',
                type: 'scatter',
                mode: 'lines+markers',
                line: { color: '#2563eb', width: 3 }
            },
            {
                x: ['2020', '2021', '2022', '2023', '2024', '2025'],
                y: [165000, 170000, 175000, 185000, 190000, 195000],
                name: '80% AMI Buying Power',
                type: 'scatter',
                mode: 'lines+markers',
                line: { color: '#ef4444', width: 3, dash: 'dot' }
            }
        ];

        // Merge shared layout with chart-specific layout
        const affordLayout = { ...layoutConfig, legend: { orientation: 'h', y: -0.2 } };
        Plotly.newPlot('affordabilityChart', affordabilityData, affordLayout, config);

    </script>
</body>
</html>
