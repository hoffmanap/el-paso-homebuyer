<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geographic Map - El Paso Homebuyer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #fafbfc;
        }

        /* Navigation overlay */
        nav {
            position: absolute;
            top: 20px;
            left: 50px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 1000;
            padding: 1rem 1.5rem;
            display: flex;
            gap: 1.5rem;
        }

        nav a { text-decoration: none; color: #1a202c; font-weight: 600; font-size: 0.9rem; }
        nav a:hover { color: #2563eb; }

        #map { width: 100vw; height: 100vh; }

        /* Custom Popup Styling */
        .leaflet-popup-content-wrapper {
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .custom-popup { font-family: 'Inter', sans-serif; }
        .custom-popup h3 { color: #0f172a; margin-bottom: 4px; font-size: 16px; }
        .custom-popup p { color: #475569; margin: 2px 0; font-size: 13px; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">← Back to Dashboard</a>
        <a href="#">El Paso Migration Flow Map</a>
    </nav>

    <div id="map"></div>

    <script>
        // Initialize map centered on El Paso
        const map = L.map('map', {
            zoomControl: false // Move zoom control to bottom right
        }).setView([31.7903, -106.4233], 11);
        
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        // Modern, clean base map (CartoDB Positron)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // Fetch Texas Zip Code GeoJSON and filter for El Paso
        fetch('https://raw.githubusercontent.com/OpenDataDE/State-zip-code-GeoJSON/master/tx_texas_zip_codes_geo.min.json')
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    // FILTER: Only keep zip codes starting with 799 (El Paso)
                    filter: function(feature) {
                        const zip = feature.properties.ZCTA5CE10;
                        return zip && zip.startsWith('799');
                    },
                    // STYLE: Create the polygon styling
                    style: function(feature) {
                        return {
                            color: '#2563eb',       // Border color
                            weight: 1.5,            // Border thickness
                            opacity: 0.8,
                            fillColor: '#60a5fa',   // Fill color
                            fillOpacity: 0.3
                        };
                    },
                    // INTERACTIVITY: Hover effects and Popups
                    onEachFeature: function(feature, layer) {
                        const zipCode = feature.properties.ZCTA5CE10;
                        
                        // Add hover effect
                        layer.on({
                            mouseover: function(e) {
                                const layer = e.target;
                                layer.setStyle({ fillOpacity: 0.6, weight: 2 });
                                layer.bringToFront();
                            },
                            mouseout: function(e) {
                                layer.setStyle({ fillOpacity: 0.3, weight: 1.5 });
                            }
                        });

                        // Beautiful Popup Content
                        const popupContent = `
                            <div class="custom-popup">
                                <h3>ZIP Code: ${zipCode}</h3>
                                <p><strong>Migration Zone:</strong> Active</p>
                                <p><strong>Data:</strong> HMDA & MLS Cross-Referenced</p>
                            </div>
                        `;
                        layer.bindPopup(popupContent);
                    }
                }).addTo(map);
            })
            .catch(err => console.error("Error loading GeoJSON data:", err));
    </script>
</body>
</html>
